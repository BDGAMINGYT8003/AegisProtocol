<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aegis Protocol - DeFi & GameFi AI Gateway</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="main-content">
        <div class="logo">
            <img src="images/AegisProtocol.png" alt="Aegis Protocol" class="logo-image">
        </div>

        <div class="search-container">
            <div class="search-input-area">
                <div class="ask-anything-text" contenteditable="true" data-placeholder="Ask about DeFi protocols, token analytics, or GameFi strategies..."></div>
            </div>
            <div id="attachment-preview-area" style="display: none; margin-top: 10px; padding: 8px; background-color: var(--button-bg); border-radius: 12px; text-align: center;">
                <img id="attachment-thumbnail" src="#" alt="Image preview" style="max-width: 120px; max-height: 120px; border-radius: 8px; object-fit: cover; border: 1px solid var(--button-border);"/>
            <button id="remove-attachment-button" class="action-button action-button-danger" style="margin-top: 8px;">
                    <i class="fas fa-trash-alt"></i> Remove
                </button>
            </div>
            <div class="search-actions-area">
                <div class="action-buttons-left">
                    <button class="action-button">
                        <i class="fas fa-paperclip"></i>
                        <span class="button-text">Attach</span>
                    </button>
                    <button class="action-button">
                        <i class="fas fa-globe"></i>
                        <span class="button-text">Search</span>
                    </button>
                    <button class="action-button">
                        <i class="fas fa-lightbulb"></i>
                        <span class="button-text">Think</span>
                    </button>
                </div>
                <div class="action-buttons-right">
                    <div class="model-selector-container" style="position: relative;">
                        <button class="model-selector">
                            <span id="selected-model-label">Aegis Core Pro</span> <i class="fas fa-chevron-down"></i>
                        </button>
                        <div id="model-dropdown-list" class="model-dropdown" style="display: none;">
                            <!-- Items will be populated by JS -->
                        </div>
                    </div>
                    <button class="send-button">
                        <i class="fas fa-arrow-up"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="api-response-area" class="api-response-area-styling">
            <div class="spinner-container" style="display: none;"> <!-- Initially hidden -->
                <div class="spinner"></div>
            </div>
            <div class="response-content"></div> <!-- Actual API response will go here -->
        </div>

        <a href="#" class="legacy-search-link">Traditional Analytics Portal</a>
    </div>

    <!-- Hidden file input for image upload -->
    <input type="file" id="image-upload-input" accept="image/*" style="display: none;">

    <div id="chat-container" style="display: none;">
        <div id="chat-history-sidebar">
            <button id="new-chat-button" class="action-button">
                <i class="fas fa-plus"></i> New Chat
            </button>
            <ul id="chat-history-list">
                <!-- Chat history items will be populated here by JS -->
            </ul>
        </div>
        <div id="chat-area">
            <div id="message-list">
                <!-- Chat messages will be appended here -->
            </div>
            <div id="chat-status-message" style="display: none; padding: 10px; text-align: center;"></div>
            <div id="chat-input-container">
                <input type="text" id="chat-message-input" placeholder="Type your message...">
                <button id="chat-send-button">Send</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
